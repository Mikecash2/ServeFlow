version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: serveflow
      POSTGRES_PASSWORD: serveflow
      POSTGRES_DB: serveflow
    ports:
      - "5432:5432"
    volumes:
      - serveflow_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  serveflow_pg_data:
